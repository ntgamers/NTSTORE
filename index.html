<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NT STORE PRO</title>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        /* ANIMATIONS */
        @keyframes rgbMove { to { background-position: 200% center; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes navPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* THEME SYSTEM */
        :root { 
            --bg: #f8f9fa; --card: #ffffff; --text: #1a1c1e; 
            --primary: #0061ff; --nav: rgba(255, 255, 255, 0.9); 
            --border: #edf2f7; --subtext: #718096;
        }

        .amoled-theme { 
            --bg: #000000; --card: #0a0a0a; --text: #ffffff; 
            --primary: #38bdf8; --nav: rgba(10, 10, 10, 0.9); 
            --border: #1a1a1a; --subtext: #a0aec0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: all 0.3s ease; overflow-x: hidden; }

        /* LOADER */
        #loader-stage1 { position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100000; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(56,189,248,0.1); border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
        .rgb-text-loader { font-weight: 900; background: linear-gradient(90deg, #ff00ff, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0000ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rgbMove 2s linear infinite; font-size: 1.1rem; margin-top: 20px; }
        #load-count { color: #fff; font-size: 1.5rem; font-weight: 900; margin-top: 10px; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; }
        .login-card { background: var(--card); padding: 30px; border-radius: 28px; border: 2px solid var(--primary); text-align: center; width: 90%; max-width: 350px; }
        .google-btn { background: #fff; color: #000; border: 1px solid #ddd; padding: 12px 20px; border-radius: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; cursor: pointer; margin-top: 20px; }

        /* SLIM COMPACT HEADER */
        header { 
            position: sticky; top: 0; z-index: 20000; padding: 8px 16px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--nav); backdrop-filter: blur(20px); 
            border-bottom: 2px solid var(--primary); 
        }
        .logo-box { background: #111827; padding: 4px 12px; border-radius: 10px; border: 1px solid #1f2937; }
        .logo-text { font-weight: 800; background: linear-gradient(90deg, #ff00ff, #0070f3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 0.95rem; margin: 0; }
        
        .header-controls { display: flex; gap: 8px; }
        .icon-btn { background: var(--card); color: var(--text); border: 2px solid var(--primary); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; }

        /* APP CARDS */
        .container { max-width: 1200px; width: 92%; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 18px; }
        .app-card { background: var(--card); border-radius: 24px; padding: 18px; text-align: center; border: 2px solid var(--primary); box-shadow: 0 4px 15px rgba(0, 97, 255, 0.1); animation: fadeIn 0.5s ease; transition: 0.3s; }
        .app-card:active { transform: translateY(-12px) scale(1.03); }
        .app-logo-box { width: 80px; height: 80px; margin: 0 auto 12px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .app-logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .app-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .download-btn { display: block; background: var(--primary); color: #fff; padding: 10px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; border: none; width: 100%; cursor: pointer; }
        .download-btn.active-dl { background: #22c55e; pointer-events: none; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--nav); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--primary); z-index: 10000; }
        .nav-item { text-decoration: none; color: #94a3b8; font-weight: 800; font-size: 0.65rem; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; }
        .nav-item.active { color: #fff; }
        .nav-item.active::before { content: ""; position: absolute; width: 50px; height: 50px; background: var(--primary); border-radius: 50%; z-index: -1; box-shadow: 0 0 15px var(--primary); animation: navPop 0.3s forwards; }
        .nav-icon { display: block; font-size: 1.4rem; margin-bottom: 2px; }

        /* MODALS */
        .screen-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 30000; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 28px; width: 90%; max-width: 380px; text-align: center; border: 2px solid var(--primary); }
        .modal-box input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: 600; text-align: center; }
        
        .target-btn { margin-bottom: 12px !important; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .key-btn { background: var(--card); color: var(--text); border: 2px solid var(--primary); padding: 15px; border-radius: 14px; font-weight: 700; transition: 0.2s; }
        .key-btn:active { background: var(--primary); color: #fff; }

        .search-input { width: 92%; margin: 10px auto; padding: 12px 20px; border-radius: 16px; border: 2px solid var(--primary); background: var(--card); color: var(--text); display: none; }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader-stage1">
        <div class="spinner"></div>
        <div class="rgb-text-loader">NT STORE LOADING...</div>
        <div id="load-count">0%</div>
    </div>

    <!-- LOGIN SECTION -->
    <div id="login-screen">
        <div class="login-card">
            <h2 class="logo-text" style="font-size: 1.8rem;">NT STORE</h2>
            <p style="color: var(--subtext); font-size: 0.9rem;">Please login to continue</p>
            <button class="google-btn" onclick="googleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                Continue with Google
            </button>
        </div>
    </div>
    
    <div id="main-app" style="display:none; padding-bottom: 100px;">
        <header>
            <div class="logo-box"><h1 class="logo-text">NT STORE</h1></div>
            <div class="header-controls">
                <button class="icon-btn" onclick="toggleTheme()">☀️</button>
                <button class="icon-btn" onclick="toggleSearch()">🔍</button>
            </div>
        </header>

        <input type="text" class="search-input" id="searchInput" placeholder="Search apps..." onkeyup="filterApps()">

        <div id="home-sec" class="container"></div>
        <div id="pc-sec" class="container" style="display:none;"></div>

        <!-- VIP SECTION -->
        <div id="vip-sec" class="container" style="display:none;">
            <div id="vip-locked" style="width:100%;">
                <h2 style="text-align:center;">VIP PREMIUM</h2>
                <div class="app-card" style="max-width: 350px; margin: 0 auto 20px; border-color: #fbbf24;">
                    <div style="color:#fbbf24; font-weight:800; font-size:1.3rem;">VIP PREMIUM</div>
                    <div style="font-size: 2.2rem; margin:10px 0; font-weight: 900;">₹29</div>
                    <button class="download-btn" style="background:#fbbf24; color:#000;" onclick="handlePayment()">BUY NOW</button>
                </div>
                <div style="background:var(--card); padding:20px; border-radius:24px; max-width:350px; margin:0 auto; border:2px solid var(--primary);">
                    <input type="text" id="activationInput" readonly placeholder="ENTER CODE">
                    <div class="keypad">
                        <button class="key-btn" onclick="pressNum('1')">1</button><button class="key-btn" onclick="pressNum('2')">2</button><button class="key-btn" onclick="pressNum('3')">3</button>
                        <button class="key-btn" onclick="pressNum('4')">4</button><button class="key-btn" onclick="pressNum('5')">5</button><button class="key-btn" onclick="pressNum('6')">6</button>
                        <button class="key-btn" onclick="pressNum('7')">7</button><button class="key-btn" onclick="pressNum('8')">8</button><button class="key-btn" onclick="pressNum('9')">9</button>
                        <button class="key-btn" style="border-color:#ef4444; color:#ef4444" onclick="pressNum('del')">⌫</button><button class="key-btn" onclick="pressNum('0')">0</button>
                        <button class="key-btn" style="border-color:#22c55e; color:#22c55e" onclick="activateVIP()">OK</button>
                    </div>
                </div>
            </div>
            <div id="vip-unlocked" style="display:none; text-align:center; width:100%;">
                <h2 class="logo-text" style="font-size: 1.5rem;">VIP ACTIVE</h2>
                <div id="vip-timer" style="color:#fbbf24; font-weight:800; text-align: center; margin-bottom: 20px;"></div>
                <div id="vip-list" class="container"></div>
            </div>
        </div>

        <div id="about-sec" class="container" style="display:none; grid-template-columns: 1fr;">
            <div class="app-card" style="padding:40px 20px;">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcToAT3dXNvWyoTkr_MpIKIg57XyfMl_NGqdoQ&s" style="width:80px; height:80px; border-radius:50%; margin-bottom:15px; border:3px solid var(--primary);">
                <h2 class="logo-text">NT GAMER 1M</h2>
                <button class="download-btn" style="background:#ff0000; margin-top:10px;" onclick="window.open('https://youtube.com/@nt.gamerr?si=xtgXfDxc2a1ZFsOY')">YouTube</button>
                <button class="download-btn" style="background:#5865f2; margin-top:10px;" onclick="window.open('https://discord.gg/D6MYrhuXv')">Discord</button>
                <button class="download-btn" style="background:#64748b; margin-top:10px;" onclick="logout()">Logout</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="javascript:void(0)" class="nav-item active" id="nav-home" onclick="tab('home')"><span class="nav-icon">🏠</span>HOME</a>
            <a href="javascript:void(0)" class="nav-item" id="nav-pc" onclick="tab('pc')"><span class="nav-icon">💻</span>PC</a>
            <a href="javascript:void(0)" class="nav-item" onclick="handlePlusClick()"><span class="nav-icon" style="color:var(--primary); font-size:2.8rem; margin-top:-10px;">⊕</span></a>
            <a href="javascript:void(0)" class="nav-item" id="nav-vip" onclick="tab('vip')"><span class="nav-icon">💎</span>VIP</a>
            <a href="javascript:void(0)" class="nav-item" id="nav-about" onclick="tab('about')"><span class="nav-icon">👤</span>ABOUT</a>
        </nav>
    </div>

    <!-- MODALS -->
    <div id="upload-modal" class="screen-overlay">
        <div class="modal-box" id="upload-step-1">
            <h2 class="logo-text">PUBLISH APP</h2>
            <input type="text" id="up-name" placeholder="App Name">
            <input type="text" id="up-link" placeholder="Download Link">
            <input type="file" id="up-logo" accept="image/*" style="display:none" onchange="previewLogo()">
            <button class="download-btn" style="background:var(--bg); color:var(--text); border:1px solid var(--border);" onclick="document.getElementById('up-logo').click()">SELECT PHOTO</button>
            <div id="up-logo-status" style="font-size:0.8rem; color:#22c55e; margin-top:5px; display:none;">Photo Selected!</div>
            <button class="download-btn" style="margin-top:15px; border: 2px solid var(--primary);" onclick="nextUploadStep()">NEXT</button>
            <button class="download-btn" style="background:transparent; color:var(--subtext);" onclick="closeModals()">CANCEL</button>
        </div>
        <div class="modal-box" id="upload-step-2" style="display:none;">
            <h2 class="logo-text">SELECT SECTION</h2>
            <button class="download-btn target-btn" onclick="finishUpload('home')">HOME SECTION</button>
            <button class="download-btn target-btn" onclick="finishUpload('pc')">PC SECTION</button>
            <button class="download-btn target-btn" onclick="finishUpload('vip')">VIP SECTION</button>
            <button class="download-btn" style="background:transparent; color:var(--primary); margin-top:10px; border:1px dashed var(--primary);" onclick="prevUploadStep()">BACK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA8j5woHekph8pHDeWBszrwP_3PypdfkhE",
            authDomain: "nt-base.firebaseapp.com",
            databaseURL: "https://nt-base-default-rtdb.firebaseio.com",
            projectId: "nt-base",
            storageBucket: "nt-base.firebasestorage.app",
            messagingSenderId: "348200219253",
            appId: "1:348200219253:web:e285a412904120b08f7e3c",
            measurementId: "G-TN0X7VXJBL"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        let amoled = false, tempLogo = "";

        window.onload = () => {
            let count = 0;
            let loaderInt = setInterval(() => {
                count++;
                document.getElementById('load-count').innerText = count + "%";
                if(count >= 100) {
                    clearInterval(loaderInt);
                    document.getElementById('loader-stage1').style.display = 'none';
                    checkAuthState();
                }
            }, 20);
        };

        function checkAuthState() {
            auth.onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    renderApps();
                    if(localStorage.getItem("nt_vip_king_v11") === "true") {
                        document.getElementById('vip-locked').style.display = 'none';
                        document.getElementById('vip-unlocked').style.display = 'block';
                    }
                    setInterval(updateTimer, 1000);
                } else {
                    document.getElementById('main-app').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'flex';
                }
            });
        }

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => alert(error.message));
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        function handlePayment() { window.location.href = `upi://pay?pa=naitikthakare12345@oksbi&pn=NTSTORE&am=29&cu=INR`; }
        function toggleTheme() { amoled = !amoled; document.body.className = amoled ? "amoled-theme" : ""; }

        function tab(name) {
            window.scrollTo(0,0);
            ['home','pc','vip','about'].forEach(id => {
                document.getElementById(id+'-sec').style.display = (id===name ? 'grid' : 'none');
                document.getElementById('nav-'+id).classList.toggle('active', id===name);
            });
        }

        function handlePlusClick() {
            if(localStorage.getItem("nt_vip_king_v11") === "true") {
                document.getElementById('upload-modal').style.display = 'flex';
                document.getElementById('upload-step-1').style.display = 'block';
                document.getElementById('upload-step-2').style.display = 'none';
            } else { alert("VIP Access Required to Upload!"); tab('vip'); }
        }

        function previewLogo() {
            const f = document.getElementById('up-logo').files[0];
            const r = new FileReader();
            r.onloadend = () => { tempLogo = r.result; document.getElementById('up-logo-status').style.display = 'block'; };
            if(f) r.readAsDataURL(f);
        }

        function nextUploadStep() {
            if(!document.getElementById('up-name').value || !document.getElementById('up-link').value || !tempLogo) return alert("Fill all data!");
            document.getElementById('upload-step-1').style.display = 'none';
            document.getElementById('upload-step-2').style.display = 'block';
        }

        function prevUploadStep() {
            document.getElementById('upload-step-2').style.display = 'none';
            document.getElementById('upload-step-1').style.display = 'block';
        }

        function finishUpload(target) {
            database.ref('public_apps').push({ name: document.getElementById('up-name').value, file: document.getElementById('up-link').value, logo: tempLogo, target: target }).then(() => location.reload());
        }

        function simulateDownload(btn, url) {
            let p = 0; btn.classList.add('active-dl');
            let i = setInterval(() => {
                p++; btn.innerText = `DOWNLOADING ${p}%`;
                if(p >= 100) { clearInterval(i); btn.innerText = "DOWNLOAD"; btn.classList.remove('active-dl'); window.open(url, '_blank'); }
            }, 30);
        }

        function renderApps() {
            database.ref('public_apps').on('value', snap => {
                const h = document.getElementById('home-sec'), p = document.getElementById('pc-sec'), v = document.getElementById('vip-list');
                h.innerHTML = ""; p.innerHTML = ""; if(v) v.innerHTML = "";
                snap.forEach(c => {
                    let a = c.val();
                    let card = `<div class="app-card"><div class="app-logo-box"><img src="${a.logo}"></div><div class="app-title">${a.name}</div><button class="download-btn" onclick="simulateDownload(this, '${a.file}')">DOWNLOAD</button></div>`;
                    if(a.target==='pc') p.innerHTML+=card; else if(a.target==='vip' && v) v.innerHTML+=card; else h.innerHTML+=card;
                });
            });
        }

        function pressNum(v) { let f = document.getElementById('activationInput'); if(v==='del') f.value=f.value.slice(0,-1); else f.value+=v; }
        
        function activateVIP() { 
            if(document.getElementById('activationInput').value === "9860866915") { 
                alert("VIP ACTIVATION SUCCESSFUL!");
                localStorage.setItem("nt_vip_king_v11", "true"); 
                localStorage.setItem("nt_vip_time_v11", Date.now()); 
                location.reload(); 
            } else alert("Wrong Code"); 
        }

        function updateTimer() { if(localStorage.getItem("nt_vip_king_v11") === "true") { let start = parseInt(localStorage.getItem("nt_vip_time_v11")); let rem = (30*60)-Math.floor((Date.now()-start)/1000); if(rem<=0) { localStorage.removeItem("nt_vip_king_v11"); location.reload(); } else if(document.getElementById('vip-timer')) { let m=Math.floor(rem/60), s=rem%60; document.getElementById('vip-timer').innerText=`VIP Ends: ${m}:${s<10?'0'+s:s}`; } } }
        function toggleSearch() { const s = document.getElementById('searchInput'); s.style.display = (s.style.display==='block'?'none':'block'); }
        function filterApps(){ let q=document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('.app-card').forEach(c=>{ c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none"; }); }
        function closeModals() { document.querySelectorAll('.screen-overlay').forEach(m => m.style.display='none'); }
    </script>
</body>
</html>
