<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NT STORE PRO</title>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        /* ANIMATIONS (ORIGINAL) */
        @keyframes rgbMove { to { background-position: 200% center; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes navPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* THEME SYSTEM (ORIGINAL) */
        :root { 
            --bg: #f8f9fa; --card: #ffffff; --text: #1a1c1e; 
            --primary: #0061ff; --nav: rgba(255, 255, 255, 0.9); 
            --border: #edf2f7; --subtext: #718096;
        }

        .amoled-theme { 
            --bg: #000000; --card: #0a0a0a; --text: #ffffff; 
            --primary: #38bdf8; --nav: rgba(10, 10, 10, 0.9); 
            --border: #1a1a1a; --subtext: #a0aec0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: all 0.3s ease; overflow-x: hidden; }

        /* LOADER (ORIGINAL) */
        #loader-stage1 { position: fixed; inset: 0; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100000; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(56,189,248,0.1); border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
        .rgb-text-loader { font-weight: 900; background: linear-gradient(90deg, #ff00ff, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0000ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rgbMove 2s linear infinite; font-size: 1.1rem; margin-top: 20px; }
        #load-count { color: #fff; font-size: 1.5rem; font-weight: 900; margin-top: 10px; }

        /* --- LOGIN UI --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 90000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); border: 2px solid var(--primary); padding: 30px 20px; border-radius: 30px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .auth-step { display: none; animation: fadeIn 0.4s ease; }
        .auth-step.active { display: block; }
        
        .login-btn { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 16px; border: 2px solid var(--border); background: var(--card); color: var(--text); font-weight: 800; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .google-btn { border-color: #4285F4; }
        .phone-btn { background: var(--primary); color: #fff; border: none; }
        
        .country-select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-weight: 600; margin-bottom: 10px; outline: none; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 2px solid var(--primary); background: var(--bg); color: var(--text); font-weight: 700; text-align: center; font-size: 1.1rem; }
        
        .msg-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
        .back-link { color: var(--primary); font-size: 0.8rem; font-weight: 700; cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }

        /* --- ORIGINAL APP STYLES --- */
        header { position: sticky; top: 0; z-index: 20000; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; background: var(--nav); backdrop-filter: blur(20px); border-bottom: 2px solid var(--primary); }
        .logo-box { background: #111827; padding: 4px 12px; border-radius: 10px; border: 1px solid #1f2937; }
        .logo-text { font-weight: 800; background: linear-gradient(90deg, #ff00ff, #0070f3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 0.95rem; margin: 0; }
        .container { max-width: 1200px; width: 92%; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 18px; }
        .app-card { background: var(--card); border-radius: 24px; padding: 18px; text-align: center; border: 2px solid var(--primary); box-shadow: 0 4px 15px rgba(0, 97, 255, 0.1); animation: fadeIn 0.5s ease; transition: 0.3s; }
        .app-card:active { transform: translateY(-12px) scale(1.03); }
        .app-logo-box { width: 80px; height: 80px; margin: 0 auto 12px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .app-logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .app-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .download-btn { display: block; background: var(--primary); color: #fff; padding: 10px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; border: none; width: 100%; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--nav); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--primary); z-index: 10000; }
        .nav-item { text-decoration: none; color: #94a3b8; font-weight: 800; font-size: 0.65rem; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; }
        .nav-item.active { color: #fff; }
        .nav-item.active::before { content: ""; position: absolute; width: 50px; height: 50px; background: var(--primary); border-radius: 50%; z-index: -1; box-shadow: 0 0 15px var(--primary); animation: navPop 0.3s forwards; }
        .nav-icon { display: block; font-size: 1.4rem; margin-bottom: 2px; }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader-stage1">
        <div class="spinner"></div>
        <div class="rgb-text-loader">NT STORE LOADING...</div>
        <div id="load-count">0%</div>
    </div>

    <!-- LOGIN SCREEN (MULTI-PAGE) -->
    <div id="auth-screen">
        <div class="auth-card">
            
            <!-- Step 1: Selection -->
            <div id="auth-step-1" class="auth-step active">
                <div class="logo-box" style="display:inline-block; margin-bottom: 20px;"><h1 class="logo-text">NT STORE LOGIN</h1></div>
                <h3 style="margin-top:0;">CHOOSE ONE TO PROCEED</h3>
                
                <button class="login-btn google-btn" onclick="loginWithGoogle()">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="22">
                    Sign in with Google
                </button>

                <button class="login-btn phone-btn" onclick="switchAuthStep(2)">
                    <span style="font-size: 1.3rem;">📞</span>
                    Sign in with Phone Number
                </button>
            </div>

            <!-- Step 2: Country & Phone -->
            <div id="auth-step-2" class="auth-step">
                <span class="msg-icon">💬</span>
                <h3>PHONE VERIFICATION</h3>
                <p style="font-size:0.8rem; color:var(--subtext); margin-bottom:15px;">Select country and enter number</p>
                
                <select id="country-code" class="country-select" onchange="updateDialCode()">
                    <option value="">Select Country</option>
                    <option value="+91">🇮🇳 India (+91)</option>
                    <option value="+1">🇺🇸 USA (+1)</option>
                    <option value="+44">🇬🇧 UK (+44)</option>
                    <option value="+971">🇦🇪 UAE (+971)</option>
                    <option value="+92">🇵🇰 Pakistan (+92)</option>
                    <option value="+880">🇧🇩 Bangladesh (+880)</option>
                </select>

                <input type="tel" id="phone-number" class="auth-input" placeholder="Phone Number">
                
                <div id="recaptcha-container"></div>
                <button class="download-btn" style="padding:15px;" onclick="sendOTP()">SEND OTP</button>
                <span class="back-link" onclick="switchAuthStep(1)">← Back to Selection</span>
            </div>

            <!-- Step 3: OTP Verify -->
            <div id="auth-step-3" class="auth-step">
                <span class="msg-icon">📩</span>
                <h3>Verify OTP</h3>
                <p style="font-size: 0.8rem; color: var(--subtext);">Enter the 6-digit code sent to your phone</p>
                <input type="number" id="otp-code" class="auth-input" placeholder="0 0 0 0 0 0">
                <button class="download-btn" style="padding:15px; background: #22c55e;" onclick="verifyOTP()">VERIFY & LOGIN</button>
                <span class="back-link" onclick="switchAuthStep(2)">← Change Number</span>
            </div>
        </div>
    </div>
    
    <!-- MAIN APP CONTENT -->
    <div id="main-app" style="display:none; padding-bottom: 100px;">
        <header>
            <div class="logo-box"><h1 class="logo-text">NT STORE</h1></div>
            <div class="header-controls">
                <button class="icon-btn" onclick="toggleTheme()">☀️</button>
                <button class="icon-btn" onclick="firebase.auth().signOut()">🚪</button>
            </div>
        </header>

        <div id="home-sec" class="container"></div>
        <div id="pc-sec" class="container" style="display:none;"></div>
        <div id="vip-sec" class="container" style="display:none;">
             <div id="vip-locked" style="width:100%; text-align: center;">
                <h2 class="logo-text" style="font-size: 1.5rem;">VIP PREMIUM</h2>
                <button class="download-btn" style="max-width: 200px; margin: 20px auto;" onclick="window.location.href='upi://pay?pa=naitikthakare12345@oksbi&pn=NTSTORE&am=29&cu=INR'">BUY NOW ₹29</button>
             </div>
             <div id="vip-list" class="container"></div>
        </div>

        <nav class="bottom-nav">
            <a href="javascript:void(0)" class="nav-item active" id="nav-home" onclick="tab('home')"><span class="nav-icon">🏠</span>HOME</a>
            <a href="javascript:void(0)" class="nav-item" id="nav-pc" onclick="tab('pc')"><span class="nav-icon">💻</span>PC</a>
            <a href="javascript:void(0)" class="nav-item" id="nav-vip" onclick="tab('vip')"><span class="nav-icon">💎</span>VIP</a>
        </nav>
    </div>

    <script>
        // CONFIG UPDATED WITH YOUR KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyA8j5woHekph8pHDeWBszrwP_3PypdfkhE",
            authDomain: "nt-base.firebaseapp.com",
            databaseURL: "https://nt-base-default-rtdb.firebaseio.com",
            projectId: "nt-base",
            storageBucket: "nt-base.firebasestorage.app",
            messagingSenderId: "348200219253",
            appId: "1:348200219253:web:e285a412904120b08f7e3c",
            measurementId: "G-TN0X7VXJBL"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        let confirmationResult = null;

        // AUTH MONITOR
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                renderApps();
            } else {
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        // LOADER
        window.onload = () => {
            let count = 0;
            let loaderInt = setInterval(() => {
                count += 2;
                document.getElementById('load-count').innerText = count + "%";
                if(count >= 100) {
                    clearInterval(loaderInt);
                    document.getElementById('loader-stage1').style.display = 'none';
                }
            }, 30);
        };

        // LOGIN FLOW FUNCTIONS
        function switchAuthStep(step) {
            document.querySelectorAll('.auth-step').forEach(el => el.classList.remove('active'));
            document.getElementById('auth-step-' + step).classList.add('active');
            if(step === 2 && !window.recaptchaVerifier) {
                window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
            }
        }

        function updateDialCode() {
            const code = document.getElementById('country-code').value;
            const phoneInput = document.getElementById('phone-number');
            phoneInput.value = code + " ";
            phoneInput.focus();
        }

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert(err.message));
        }

        function sendOTP() {
            const phone = document.getElementById('phone-number').value.trim();
            if(!phone.startsWith('+')) return alert("Please select a country or add code manually (+91)");
            
            auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
                .then(result => {
                    confirmationResult = result;
                    switchAuthStep(3);
                }).catch(err => alert(err.message));
        }

        function verifyOTP() {
            const code = document.getElementById('otp-code').value;
            confirmationResult.confirm(code).catch(err => alert("Wrong OTP!"));
        }

        // NAVIGATION & RENDER (ORIGINAL)
        function tab(name) {
            ['home','pc','vip'].forEach(id => {
                document.getElementById(id+'-sec').style.display = (id===name ? 'grid' : 'none');
                document.getElementById('nav-'+id).classList.toggle('active', id===name);
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('amoled-theme');
        }

        function renderApps() {
            database.ref('public_apps').on('value', snap => {
                const h = document.getElementById('home-sec'), p = document.getElementById('pc-sec'), v = document.getElementById('vip-list');
                h.innerHTML = ""; p.innerHTML = ""; v.innerHTML = "";
                snap.forEach(c => {
                    let a = c.val();
                    let card = `<div class="app-card"><div class="app-logo-box"><img src="${a.logo}"></div><div class="app-title">${a.name}</div><button class="download-btn" onclick="window.open('${a.file}')">DOWNLOAD</button></div>`;
                    if(a.target==='pc') p.innerHTML+=card; else if(a.target==='vip') v.innerHTML+=card; else h.innerHTML+=card;
                });
            });
        }
    </script>
</body>
</html>
